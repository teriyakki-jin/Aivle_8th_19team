spring.application.name=automobile-risk

# PostgreSQL Configuration (overridden by env vars in ECS)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/automobile_risk}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=30

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=3001

# API v1 Prefix
server.servlet.context-path=/

# ML Service Configuration
ml-service.base-url=${ML_SERVICE_BASE_URL:http://localhost:8000}
datasets.base-path=${DATASETS_BASE_PATH:}
datasets.base-url=${DATASETS_BASE_URL:}

# AWS S3
cloud.aws.region.static=ap-northeast-2
cloud.aws.s3.bucket=${AWS_S3_BUCKET:automobile-risk-bucket}

# file.upload-dir
file.upload-dir=/tmp

# Actuator (ALB health check)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# CORS Configuration for Production
cors.allowed-origins=https://d33ujyrx3odob1.cloudfront.net,http://localhost:3000
