spring.application.name=automobile-risk

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/automobile_risk
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=30

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul
spring.jackson.time-zone=Asia/Seoul

# Server Configuration
server.port=3001

# API v1 Prefix
server.servlet.context-path=/

# ML Service Configuration
ml-service.base-url=http://localhost:8000
datasets.base-path=${DATASETS_BASE_PATH:}
datasets.base-url=${DATASETS_BASE_URL:}

# Local File Storage
file.upload-dir=C:/uploads

# CORS Configuration for Local Development  
cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,https://d33ujyrx3odob1.cloudfront.net

# AWS 비활성
cloud.aws.stack.auto=false

# 더미 데이터 생성
dummy.enabled=false
dummy.rows=3
dummy.lateRate=0.05
dummy.seed=42


