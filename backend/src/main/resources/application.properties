spring.application.name=automobile-risk

# === Profile ===
# local
spring.profiles.active=local
# prod -> java -jar app.jar -Dspring.profiles.active=prod

# === PostgreSQL Configuration ===
spring.datasource.url=jdbc:postgresql://localhost:5432/automobile_risk
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=3001

# API v1 Prefix
server.servlet.context-path=/
# ML Service Configuration
ml-service.base-url=${ML_SERVICE_BASE_URL:http://localhost:8000}
datasets.base-path=${DATASETS_BASE_PATH:}
datasets.base-url=${DATASETS_BASE_URL:}
